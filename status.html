<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Status Laundry</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

.card{

background:white;
padding:20px;
border-radius:10px;
max-width:350px;
margin:auto;

}

textarea{

width:100%;
height:80px;

}

button{

margin-top:10px;
padding:10px;
width:100%;
background:black;
color:white;
border:none;

}

</style>

</head>

<body>

<div class="card">

<h2>Status Laundry</h2>

<p>ID : <span id="id"></span></p>

<p>Status : <span id="status">Diproses</span></p>

<hr>

<h3>Kritik / Masukan</h3>

<textarea id="kritik" placeholder="Masukan anda..."></textarea>

<button onclick="kirim()">Kirim</button>

</div>

<script>

function getParam(p){

return new URLSearchParams(window.location.search).get(p);

}

document.getElementById("id").innerText=getParam("id");

function kirim(){

let id=getParam("id");

let kritik=document.getElementById("kritik").value;

fetch("https://script.google.com/macros/s/AKfycbz1QLv6RkW4Ef9JNbT4U1tVQ6nSNIqPd72n74aTB1gaVtyUg2Il_so996bqzl3pYfqN1Q/exec",{

method:"POST",

body:new URLSearchParams({

id:id,

kritik:kritik

})

})

.then(res=>res.text())

.then(res=>{

alert("Terima kasih atas masukan anda 🙏");

});

}

</script>

</body>

</html>
