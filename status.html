<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Status Laundry</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:10px;
max-width:350px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.status{
font-size:20px;
font-weight:bold;
margin:10px 0;
color:#2c3e50;
}

textarea{
width:100%;
height:80px;
padding:8px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:black;
color:white;
border:none;
cursor:pointer;
border-radius:6px;
}

.loading{
color:#888;
}

</style>
</head>

<body>

<div class="card">

<h2>Status Laundry</h2>

<p>ID Transaksi</p>
<div class="status" id="id">Memuat...</div>

<p>Status</p>
<div class="status" id="status">Memuat...</div>

<hr>

<h3>Kritik / Masukan</h3>

<textarea id="kritik" placeholder="Tulis kritik atau masukan..."></textarea>

<button onclick="kirim()">Kirim Masukan</button>

</div>

<script>

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1QLv6RkW4Ef9JNbT4U1tVQ6nSNIqPd72n74aTB1gaVtyUg2Il_so996bqzl3pYfqN1Q/exec";

function getParam(name){
return new URLSearchParams(window.location.search).get(name);
}

let id = getParam("id");

document.getElementById("id").innerText = id || "-";

function loadStatus(){

if(!id){
document.getElementById("status").innerText="ID tidak ditemukan";
return;
}

fetch(APPS_SCRIPT_URL+"?id="+encodeURIComponent(id))
.then(res=>res.json())
.then(data=>{
document.getElementById("status").innerText=data.status || "Diproses";
})
.catch(()=>{
document.getElementById("status").innerText="Gagal memuat status";
});

}

function kirim(){

let kritik=document.getElementById("kritik").value.trim();

if(!kritik){
alert("Masukan masih kosong");
return;
}

fetch(APPS_SCRIPT_URL,{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:new URLSearchParams({
id:id,
kritik:kritik
})
})
.then(res=>res.text())
.then(()=>{
alert("Terima kasih atas masukan anda 🙏");
document.getElementById("kritik").value="";
})
.catch(()=>{
alert("Gagal mengirim masukan");
});

}

loadStatus();

</script>

</body>
</html>
