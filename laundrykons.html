<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Struk Laundry Konsumen</title>

<style>
body{font-family:monospace;background:#f4f4f4;}
.wrapper{width:230px;margin:auto;}
.struk{background:#fff;padding:10px;border:1px solid #ccc;margin-bottom:20px;}
.center{text-align:center;}
hr{border-top:1px dashed #000;}
.logo{width:150px;margin-bottom:5px;}
table{width:100%;font-size:11px;border-collapse:collapse;}
.total{font-weight:bold;font-size:13px;}
.qr{text-align:center;margin-top:8px;}
.qr img{width:200px;height:200px;}
.copy-title{text-align:center;font-weight:bold;font-size:12px;margin-bottom:5px;}
.footer-text{margin-top:10px;text-align:center;font-size:11px;font-weight:bold;}
.btn-print{margin-top:15px;width:100%;padding:8px;background:black;color:white;border:none;}

@media print{
.btn-print{display:none;}
body{background:white;}
.struk{border:none;}
}

.status-bayar{
 text-align:center;
 margin-top:8px;
 font-size:13px;
 font-weight:bold;
 padding:5px;
 border-top:1px dashed #000;
}

.lunas{color:green;}
.belum{color:red;}
.dp{color:orange;}
</style>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
 
<script>

async function kirimWAGambar(){

 let no = getParam("no_hp") || "";

 if(no.startsWith("0")){
   no = "62" + no.substring(1);
 }

 let struk = document.querySelector(".struk");

 // ambil gambar dari struk
 let canvas = await html2canvas(struk);
 let imgData = canvas.toDataURL("image/png");

 let nama = getParam("nama_pelanggan") || "";
 let id = getParam("id_transaksi") || "";

 let pesan = `Halo ${nama}, berikut struk laundry Anda (ID: ${id})`;

 // ⚠️ WA tidak bisa kirim image base64 langsung
 // jadi kita buka WA + tampilkan gambar untuk disimpan manual

 let newTab = window.open();
 newTab.document.write(`
   <html>
   <head><title>Kirim WA</title></head>
   <body style="text-align:center;font-family:sans-serif">
     <h3>Simpan gambar lalu kirim ke WhatsApp</h3>
     <img src="${imgData}" style="width:300px"><br><br>
     <a href="https://wa.me/${no}?text=${encodeURIComponent(pesan)}" target="_blank">
       <button style="padding:10px 20px">Buka WhatsApp</button>
     </a>
   </body>
   </html>
 `);

}

function getParam(p){
 return new URLSearchParams(window.location.search).get(p);
}

function formatRupiah(a){
 if(!a || isNaN(a)) return "0";
 return new Intl.NumberFormat('id-ID').format(a);
}

function parseRupiah(str){
 if(!str) return 0;
 return parseFloat(str.replace(/[^0-9]/g,'')) || 0;
}

function formatDateTime(datetimeStr){
 if (!datetimeStr) return "";
 let date = new Date(datetimeStr.replace(' ', 'T'));
 if (!isNaN(date.getTime())) {
  let d = String(date.getDate()).padStart(2,'0');
  let m = String(date.getMonth()+1).padStart(2,'0');
  let y = date.getFullYear();
  let h = String(date.getHours()).padStart(2,'0');
  let min = String(date.getMinutes()).padStart(2,'0');
  return d+"/"+m+"/"+y+" "+h+":"+min;
 }
 return datetimeStr;
}

function isiStruk(){
 document.getElementById("nama_toko").innerHTML = getParam("nama_toko") || "";
 document.getElementById("alamat_toko").innerHTML = getParam("alamat_toko") || "";
 document.getElementById("telp_toko").innerHTML = "Telp: "+(getParam("telp_toko") || "");

 document.getElementById("id").innerHTML = getParam("id_transaksi") || "-";
 document.getElementById("nama").innerHTML = getParam("nama_pelanggan") || "-";
 document.getElementById("masuk").innerHTML = formatDateTime(getParam("tanggal_masuk"));
 document.getElementById("selesai").innerHTML = formatDateTime(getParam("tanggal_selesai"));

 let layanan = (getParam("layanan") || "").split("|");
 let berat = (getParam("berat") || "").split("|");
 let harga = (getParam("harga") || "").split("|");
 let subtotal = (getParam("subtotal") || "").split("|");
 let statusBayar = (getParam("status_bayar") || "belum").toLowerCase();
 let tabel = document.getElementById("detail");
 tabel.innerHTML="";

 for(let i=0;i<layanan.length;i++){
  if(layanan[i]){
   let b=parseFloat(berat[i])||0;
   let h=parseRupiah(harga[i]);
   let s=parseRupiah(subtotal[i]);
   tabel.innerHTML +=
   "<tr><td colspan='3'><b>"+layanan[i]+"</b></td></tr>"+
   "<tr>"+
   "<td style='padding-left:10px'>"+b+" Kg x Rp"+formatRupiah(h)+"</td>"+
   "<td></td>"+
   "<td align='right'>Rp"+formatRupiah(s)+"</td>"+
   "</tr>";
  }
 }

 let total=parseRupiah(getParam("total"));
 document.getElementById("total").innerHTML="Rp"+formatRupiah(total);

 let elBayar = document.getElementById("status_bayar");
 elBayar.classList.remove("lunas","belum","dp");

 if(statusBayar === "lunas"){
  elBayar.innerHTML = "PEMBAYARAN: LUNAS";
  elBayar.classList.add("lunas");
 }
 else if(statusBayar === "dp"){
  elBayar.innerHTML = "PEMBAYARAN: DP";
  elBayar.classList.add("dp");
 }
 else{
  elBayar.innerHTML = "PEMBAYARAN: BELUM LUNAS";
  elBayar.classList.add("belum");
 }
 
 let link = "https://mahfut25.github.io/nota_toko/status.html?id="+getParam("id_transaksi");
 document.getElementById("qr").src =
 "https://api.qrserver.com/v1/create-qr-code/?size=120x120&data="+encodeURIComponent(link);
}

window.onload=function(){
 isiStruk();
}

</script>

</head>

<body>

<div class="wrapper">

<div class="struk">

<div class="copy-title">STRUK LAUNDRY - KONSUMEN</div>

<div class="center">
<img src="Logo_laundry.jpg" class="logo"><br>
<b id="nama_toko"></b><br>
<span id="alamat_toko"></span><br>
<span id="telp_toko"></span>
</div>

<hr>

<table>
<tr><td>ID</td><td>:</td><td id="id"></td></tr>
<tr><td>Pelanggan</td><td>:</td><td id="nama"></td></tr>
<tr><td>Masuk</td><td>:</td><td id="masuk"></td></tr>
<tr><td>Selesai</td><td>:</td><td id="selesai"></td></tr>
</table>

<hr>

<table id="detail"></table>

<hr>

Total: <span class="total" id="total"></span>

<div class="qr">
<img id="qr" width="200">
</div>

<div class="status-bayar" id="status_bayar"></div>
 
<div class="footer-text">
Terima kasih sudah mempercayakan layanan laundry anda kepada kami<br><br><br>
</div>

</div>

<button class="btn-print" onclick="window.print()">Cetak</button>
<button class="btn-print" onclick="kirimWAGambar()">Kirim WA (Struk)</button>

</div>

</body>
</html>
