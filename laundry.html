<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Struk Laundry</title>

<style>

body{
font-family:monospace;
background:#f4f4f4;
}

.wrapper{
width:230px;
margin:auto;
}

.struk{
background:white;
padding:10px;
border:1px solid #ccc;
margin-bottom:20px;
}

.center{
text-align:center;
}

.logo{
width:60px;
margin-bottom:5px;
}

hr{
border-top:1px dashed black;
}

table{
width:100%;
font-size:11px;
}

.total{
font-weight:bold;
font-size:13px;
}

.qr{
text-align:center;
margin-top:8px;
}

.copy-title{
text-align:center;
font-weight:bold;
font-size:12px;
margin-bottom:5px;
}

.footer-text{
margin-top:10px;
text-align:center;
font-size:11px;
}

.btn-print{
margin-top:15px;
width:100%;
padding:8px;
background:black;
color:white;
border:none;
}

@media print{

.btn-print{display:none;}

body{background:white;}

.struk{border:none;}

}

</style>

<script>

function getParam(p){
return new URLSearchParams(window.location.search).get(p);
}

function rupiah(a){
if(!a) return "0";
return new Intl.NumberFormat("id-ID").format(a);
}

function isi(prefix,isArsip){

document.getElementById(prefix+"nama_toko").innerText=getParam("nama_toko")||"";
document.getElementById(prefix+"alamat_toko").innerText=getParam("alamat_toko")||"";
document.getElementById(prefix+"telp_toko").innerText="Telp: "+(getParam("telp_toko")||"");

document.getElementById(prefix+"id").innerText=getParam("id_transaksi")||"-";
document.getElementById(prefix+"nama").innerText=getParam("nama_pelanggan")||"-";
document.getElementById(prefix+"masuk").innerText=getParam("tanggal_masuk")||"-";
document.getElementById(prefix+"selesai").innerText=getParam("tanggal_selesai")||"-";

let layanan=(getParam("layanan")||"").split("|");
let berat=(getParam("berat")||"").split("|");
let harga=(getParam("harga")||"").split("|");
let subtotal=(getParam("subtotal")||"").split("|");

let tabel=document.getElementById(prefix+"detail");

for(let i=0;i<layanan.length;i++){

if(!layanan[i]) continue;

let b=parseFloat(berat[i])||0;
let h=parseFloat(harga[i])||0;
let s=parseFloat(subtotal[i])||0;

tabel.innerHTML+=
"<tr><td colspan='3'><b>"+layanan[i]+"</b></td></tr>"+
"<tr>"+
"<td style='padding-left:10px'>"+b+" Kg x Rp"+rupiah(h)+"</td>"+
"<td></td>"+
"<td align='right'>Rp"+rupiah(s)+"</td>"+
"</tr>";

}

document.getElementById(prefix+"total").innerText="Rp"+rupiah(getParam("total"));

let link;

if(isArsip){

link="https://www.appsheet.com/start/APLIKASILAUNDRY-1018415#view=Detail&id="+getParam("id_transaksi");

}else{

link="https://mahfut25.github.io/nota_toko/status.html?id="+getParam("id_transaksi");

}

document.getElementById(prefix+"qr").src=
"https://quickchart.io/qr?size=120&text="+encodeURIComponent(link);

}

window.onload=function(){

isi("c1_",false);
isi("c2_",true);

}

</script>

</head>

<body>

<div class="wrapper">

<div class="struk">

<div class="copy-title">STRUK LAUNDRY</div>

<div class="center">

<img src="Logo.png" class="logo"><br>

<b id="c1_nama_toko"></b><br>
<span id="c1_alamat_toko"></span><br>
<span id="c1_telp_toko"></span>

</div>

<hr>

<table>

<tr><td>ID</td><td>:</td><td id="c1_id"></td></tr>
<tr><td>Pelanggan</td><td>:</td><td id="c1_nama"></td></tr>
<tr><td>Masuk</td><td>:</td><td id="c1_masuk"></td></tr>
<tr><td>Selesai</td><td>:</td><td id="c1_selesai"></td></tr>

</table>

<hr>

<table id="c1_detail"></table>

<hr>

Total : <span class="total" id="c1_total"></span>

<div class="qr">
<img id="c1_qr" width="100">
</div>

<div class="footer-text">
Terima kasih telah menggunakan layanan kami
</div>

</div>

<button class="btn-print" onclick="window.print()">Cetak</button>

</div>

</body>
</html>
